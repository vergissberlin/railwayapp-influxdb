<svg width="1280" height="270" viewBox="0 0 1280 270" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">InfluxDB header banner</title>
  <desc id="desc">Flat gradient banner for InfluxDB template with software logo.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1280" y2="270" gradientUnits="userSpaceOnUse">
      <stop stop-color="#0B1021"/>
      <stop offset="0.55" stop-color="#131B3F"/>
      <stop offset="1" stop-color="#1F174A"/>
    </linearGradient>
  </defs>
  <rect width="1280" height="270" rx="26" fill="url(#bg)"/>
  <circle cx="1120" cy="68" r="34" fill="#4F46E5" opacity="0.33"/>
  <circle cx="1185" cy="205" r="56" fill="#06B6D4" opacity="0.15"/>
  
      <rect x="64" y="60" width="152" height="152" rx="24" fill="#0B1228" opacity="0.92"/>
      <image href="data:image/png;base64," x="84" y="80" width="112" height="112" preserveAspectRatio="xMidYMid meet"/>
    
  <text x="258" y="122" fill="#FFFFFF" font-family="Inter,Segoe UI,Roboto,Helvetica,Arial,sans-serif" font-size="52" font-weight="800">InfluxDB</text>
  <text x="258" y="168" fill="#B6C2FF" font-family="Inter,Segoe UI,Roboto,Helvetica,Arial,sans-serif" font-size="28" font-weight="500">Railway Template</text>
  <rect x="258" y="188" width="286" height="44" rx="22" fill="#1C285D" stroke="#67E8F9" stroke-opacity="0.6"/>
  <text x="284" y="216" fill="#CFFAFE" font-family="Inter,Segoe UI,Roboto,Helvetica,Arial,sans-serif" font-size="19" font-weight="700">Deploy on Railway</text>
</svg>
